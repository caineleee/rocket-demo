spring.application.name=order-service
server.port=8081

# IdWorker 配置(分布式ID生成器)
id-worker.worker-id=1
id-worker.datacenter-id=1

# ========================================
# MySQL 数据库配置
# ========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:rocket-demo-db}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.type-aliases-package=org.lee.rocket.train.service.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 完全禁用 Spring Cloud Nacos Config(不从Nacos读取配置)
spring.cloud.nacos.config.enabled=false
spring.config.import=
nacos.logging.default.config.enabled=false

# RocketMQ name-server & producer group
#rocketmq.name-server=namesrv-1:9876;namesrv-2:9876;namesrv-3:9876
rocketmq.name-server=${ROCKETMQ_NAMESRV:localhost:9876}
rocketmq.producer.group=order-producer-group

# ========================================
# RocketMQ Consumer 配置
# ========================================
# 订单取消主题消费者组
#rocketmq.consumer.order-cancel.group=order-cancel-consumer-group
#rocketmq.consumer.order-cancel.topic=order-cancel-topic
#rocketmq.consumer.order-cancel.tag=*

# 订单超时主题消费者组
#rocketmq.consumer.order-timeout.group=order-timeout-consumer-group
#rocketmq.consumer.order-timeout.topic=order-timeout-topic
#rocketmq.consumer.order-timeout.tag=*

# 支付成功主题消费者组
#rocketmq.consumer.pay-success.group=pay-success-consumer-group
#rocketmq.consumer.pay-success.topic=pay-success-topic
#rocketmq.consumer.pay-success.tag=*

# 订单确认失败,回滚主题消费者组
rocketmq.consumer.order-failure.group=order-cancel-consumer-group
mq.topics.order-failure=order-failure-topic
mq.tags.order-failure=*

# Docker Compose
spring.docker.compose.lifecycle-management=start-only
#spring.docker.compose.stop.command=down


dubbo.application.name=order-service

# Zookeeper
#dubbo.registries.zk.id=zk
#dubbo.registries.zk.protocol=zookeeper
#dubbo.registries.zk.address=192.168.5.22:2181

# Nacos (仅用作 Dubbo 注册中心)
dubbo.registries.nacos.id=nacos
dubbo.registries.nacos.protocol=nacos
dubbo.registries.nacos.address=${NACOS_SERVER_ADDR:localhost:8848}

# 禁用 Dubbo 配置中心和元数据中心(只使用注册中心功能)
dubbo.config-center.address=
dubbo.metadata-report.address=


dubbo.provider.register-mode=application
# 禁用 Dubbo 启动时服务检查(开发环境使用,避免依赖服务未启动导致失败)
dubbo.consumer.check=false
# 设置消费者超时时间为3秒(默认1秒太短,容易超时)
dubbo.consumer.timeout=3000


dubbo.protocol.name=dubbo
dubbo.protocol.port=-1

# Dubbo QoS 端口(每个服务独立,避免冲突)
dubbo.application.qos-port=22221

dubbo.provider.version=1.0.0
dubbo.provider.group=default

# Dubbo 序列化安全(开发环境禁用严格模式,避免白名单配置麻烦)
dubbo.security.serialize.check=false

