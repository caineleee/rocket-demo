  # ==================== Nacos (新一代注册/配置中心) ====================
  nacos:
    image: nacos/nacos-server:v2.4.0
    container_name: nacos
    ports:
      - "8848:8848"   # HTTP 端口 / 控制台访问端口
      - "9848:9848"   # gRPC 通信端口 (Nacos 2.x 核心端口，必须映射)
      - "9849:9849"   # gRPC 集群通信端口
    environment:
      MODE: standalone              # 强制以单机模式启动
      PREFER_HOST_MODE: hostname
      JVM_XMS: 512m                 # 初始堆内存
      JVM_XMX: 512m                 # 最大堆内存
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
      - ./data/nacos/data:/home/nacos/data
    restart: unless-stopped
    depends_on:
      - mysql                       # 生产环境通常依赖MySQL持久化，这里先挂载数据卷即可
    networks:
      - rocket-demo-net


