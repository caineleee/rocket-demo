      - "10909:10909"
    volumes:
      - ./data/broker-a/master/store:/home/rocketmq/store
      - ./data/broker-a/master/conf/broker.conf:/home/rocketmq/rocketmq-5.4.0/conf/broker.conf
    environment:
#      NAMESRV_ADDR: "namesrv-1:9876"
